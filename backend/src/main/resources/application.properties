# ===================================================================
# SUNUCU VE UYGULAMA AYARLARI
# ===================================================================
spring.application.name=backend
server.port=8080

# ===================================================================
# POSTGRESQL & POSTGIS VER?TABANI BA?LANTI AYARLARI
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/telco_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Otomatik Dialect Yˆnetimi
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# SQL Loglama ve Formatlama Ayarlar?
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===================================================================
# RABBITMQ ENTEGRASYON AYARLARI
# ===================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.connection-timeout=3000
spring.rabbitmq.template.reply-timeout=3000

# ===================================================================
# MADDE 9: REDIS CACHING AYARLARI
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===================================================================
# MADDE 11: SWAGGER / OPENAPI 3 OR?J?NAL YOLLARI (KES?N «÷Z‹M)
# ===================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=method

# ===================================================================
# JWT G‹VENL?K PARAMETRELERI
# ===================================================================
telco.jwt.secret=${JWT_SECRET}
telco.jwt.expiration=86400000