# ===================================================================
# SUNUCU VE UYGULAMA AYARLARI
# ===================================================================
spring.application.name=backend
server.port=8080

# ===================================================================
# POSTGRESQL & POSTGIS VER?TABANI BA?LANTI AYARLARI
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/telco_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate 6/7 Otomatik Dialect Yönetimi (Spatial uzant?s?n? kendi alg?lar)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# SQL Loglama ve Formatlama Ayarlar?
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# RABBITMQ ENTEGRASYON AYARLARI
# ===================================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RabbitMQ kilitlenmesini önlemek için ba?lant? zaman a??mlar? (Milisaniye)
spring.rabbitmq.connection-timeout=3000
spring.rabbitmq.template.reply-timeout=3000