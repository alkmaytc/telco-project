# ===================================================================
# SUNUCU VE UYGULAMA AYARLARI
# ===================================================================
spring.application.name=backend
server.port=8080

# ===================================================================
# POSTGRESQL VERITABANI BAGLANTI AYARLARI
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:telco_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===================================================================
# RABBITMQ AYARLARI
# ===================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.connection-timeout=3000
spring.rabbitmq.template.reply-timeout=3000

# ===================================================================
# REDIS AYARLARI
# ===================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ===================================================================
# SWAGGER AYARLARI
# ===================================================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=method

# ===================================================================
# JWT AYARLARI
# ===================================================================
telco.jwt.secret=${JWT_SECRET}
telco.jwt.expiration=86400000