version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: telco_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telco_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: telco_redis
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: telco_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

volumes:
  pg_data: